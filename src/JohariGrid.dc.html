<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:grid;grid-template-columns:74px 1fr 1fr;gap:9px;align-items:stretch;font-family:Pretendard,sans-serif;">
  <div></div>
  <div style="display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#8C8378;padding-bottom:2px;">남이 아는 나</div>
  <div style="display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#8C8378;padding-bottom:2px;">남이 모르는 나</div>

  <div style="display:flex;align-items:center;justify-content:center;text-align:center;font-size:12px;font-weight:600;color:#8C8378;line-height:1.35;">내가<br>아는 나</div>

  <div style="background:#E7EBDF;border:1px solid #C7D0B6;border-radius:14px;padding:15px;min-height:150px;display:flex;flex-direction:column;gap:11px;">
    <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;">
      <span style="font-family:'Gowun Batang',serif;font-weight:700;font-size:16px;color:#4E5B3B;">열린 영역</span>
      <span style="font-size:11px;color:#7A8466;">나도 알고 남도 아는 나</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start;">
      <sc-for list="{{ open }}" as="w" hint-placeholder-count="3">
        <span style="display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid #D6DEC8;border-radius:999px;padding:5px 11px;font-size:13px;color:#3F4A30;font-weight:500;">{{ w.word }}<span style="font-size:10px;color:#8A9472;font-weight:600;">{{ w.countLabel }}</span></span>
      </sc-for>
      <sc-if value="{{ openEmpty }}" hint-placeholder-val="{{ false }}"><span style="font-size:13px;color:#9AA383;">아직 없어요</span></sc-if>
    </div>
  </div>

  <div style="background:#ECE6F1;border:1px solid #D2C9DF;border-radius:14px;padding:15px;min-height:150px;display:flex;flex-direction:column;gap:11px;">
    <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;">
      <span style="font-family:'Gowun Batang',serif;font-weight:700;font-size:16px;color:#5E5280;">숨겨진 영역</span>
      <span style="font-size:11px;color:#897CA5;">나는 알지만 덜 드러난 나</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start;">
      <sc-for list="{{ hidden }}" as="w" hint-placeholder-count="2">
        <span style="display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid #DBD3E6;border-radius:999px;padding:5px 11px;font-size:13px;color:#4C4470;font-weight:500;">{{ w.word }}<span style="font-size:10px;color:#9286B0;font-weight:600;">{{ w.countLabel }}</span></span>
      </sc-for>
      <sc-if value="{{ hiddenEmpty }}" hint-placeholder-val="{{ false }}"><span style="font-size:13px;color:#A79BC2;">아직 없어요</span></sc-if>
    </div>
  </div>

  <div style="display:flex;align-items:center;justify-content:center;text-align:center;font-size:12px;font-weight:600;color:#8C8378;line-height:1.35;">내가<br>모르는 나</div>

  <div style="background:#F4E5D8;border:1px solid #E4C8B0;border-radius:14px;padding:15px;min-height:150px;display:flex;flex-direction:column;gap:11px;">
    <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;">
      <span style="font-family:'Gowun Batang',serif;font-weight:700;font-size:16px;color:#9C5A36;">보이지 않는 영역</span>
      <span style="font-size:11px;color:#B98763;">나는 몰랐지만 남이 보는 나</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start;">
      <sc-for list="{{ blind }}" as="w" hint-placeholder-count="2">
        <span style="display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid #EAD2BD;border-radius:999px;padding:5px 11px;font-size:13px;color:#8A4F30;font-weight:500;">{{ w.word }}<span style="font-size:10px;color:#B98763;font-weight:600;">{{ w.countLabel }}</span></span>
      </sc-for>
      <sc-if value="{{ blindEmpty }}" hint-placeholder-val="{{ false }}"><span style="font-size:13px;color:#C49A78;">아직 없어요</span></sc-if>
    </div>
  </div>

  <div style="background:#ECE7DD;border:1px solid #D9CFBE;border-radius:14px;padding:15px;min-height:150px;display:flex;flex-direction:column;gap:11px;">
    <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;">
      <span style="font-family:'Gowun Batang',serif;font-weight:700;font-size:16px;color:#7C6E54;">미지의 영역</span>
      <span style="font-size:11px;color:#A2937A;">아직 탐색되지 않은 가능성</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start;">
      <sc-for list="{{ unknown }}" as="w" hint-placeholder-count="4">
        <span style="display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid #E0D6C5;border-radius:999px;padding:5px 11px;font-size:13px;color:#6E624C;font-weight:500;">{{ w.word }}</span>
      </sc-for>
      <sc-if value="{{ unknownEmpty }}" hint-placeholder-val="{{ false }}"><span style="font-size:13px;color:#B0A488;">아직 없어요</span></sc-if>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:680,&quot;height&quot;:420},&quot;open&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{word:string,count:number,countLabel:string}[]&quot;},&quot;hidden&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{word:string,count:number,countLabel:string}[]&quot;},&quot;blind&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{word:string,count:number,countLabel:string}[]&quot;},&quot;unknown&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{word:string,count:number,countLabel:string}[]&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const p = this.props;
    const e = (a) => !a || a.length === 0;
    return {
      open: p.open || [], hidden: p.hidden || [], blind: p.blind || [], unknown: p.unknown || [],
      openEmpty: e(p.open), hiddenEmpty: e(p.hidden), blindEmpty: e(p.blind), unknownEmpty: e(p.unknown)
    };
  }
}
</script>
</body>
</html>
